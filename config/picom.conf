#################################
#             后端设置           #
#################################
# 3060 必须使用 glx 以发挥硬件加速性能
backend = "glx";
vsync = true;

# 核心修正：由于 3060 性能过剩，禁用 damage 换取极致的刷新稳定性
# 解决 UI 残留、输入字符延迟显示的最佳方案
use-damage = false;

#################################
#       NVIDIA 3060 专项优化     #
#################################

# 禁用 stencil 缓冲，防止 NVIDIA 驱动下的特定渲染错误
glx-no-stencil = true;

# 关键：30 系显卡开启此项可大幅减少窗口移动时的闪烁（Flicker）
glx-no-rebind-pixmap = true;

# 必须开启：解决 X11 下 NVIDIA 的撕裂和同步问题
xrender-sync-fence = true;

# 显存交换方法：针对 NVIDIA 建议设置为 1 (buffer-age) 或直接让驱动处理
# glx-swap-method = 1; 

#################################
#           窗口重定向           #
#################################

# 建议设为 false。3060 性能足够，不需要为了那点性能提升去承受全屏切换时的刷新 Bug
unredir-if-possible = false;

detect-transient = true;
detect-client-leader = true;

#################################
#             动画效果           #
#################################

fading = true;
# 调快动画速度，让 3060 的响应看起来更凌厉
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 4;

#################################
#             透明度             #
#################################

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

# 修正了部分类名大小写匹配问题
opacity-rule = [
    "100:class_g = 'Alacritty'",
    "100:class_g = 'xfce4-terminal'",
    "100:class_g = 'Xfce4-terminal'",
    "100:class_g = 'code-oss'",
    "100:class_g = 'Code'",
    "100:class_g = 'TelegramDesktop'"
];

#################################
#             圆角               #
#################################
# 3060 跑圆角完全没压力，如果你想尝试现代感，可以把 0 改为 10
corner-radius = 0;

#################################
#          特定窗口类型          #
#################################
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.85; focus = true; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.95; }
  dropdown_menu = { opacity = 0.95; }
};